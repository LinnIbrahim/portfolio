<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Point-Cloud AI Pipeline — noisy data resolving into a classified signal, 90 to 98 percent">
  <rect width="1200" height="675" fill="#f4f1ea"/>

  <!-- axes -->
  <path d="M150 560 H1080" stroke="#1a1a18" stroke-opacity="0.16" stroke-width="2"/>
  <path d="M150 560 V150" stroke="#1a1a18" stroke-opacity="0.16" stroke-width="2"/>
  <g stroke="#1a1a18" stroke-opacity="0.06" stroke-width="1.5">
    <path d="M150 470 H1080 M150 380 H1080 M150 290 H1080 M150 200 H1080"/>
  </g>

  <!-- the accuracy lift: noisy input climbing to a clean signal -->
  <path d="M180 520 C 360 470, 470 430, 600 360 S 860 250, 1040 195"
        fill="none" stroke="#5c6a58" stroke-width="3.5" stroke-linecap="round"/>

  <!-- raw, scattered point cloud (left / unclassified) -->
  <g fill="#1a1a18" fill-opacity="0.20">
    <circle cx="205" cy="540" r="5"/><circle cx="240" cy="500" r="5"/>
    <circle cx="225" cy="475" r="5"/><circle cx="270" cy="525" r="5"/>
    <circle cx="300" cy="488" r="5"/><circle cx="285" cy="452" r="5"/>
    <circle cx="330" cy="510" r="5"/><circle cx="355" cy="466" r="5"/>
    <circle cx="380" cy="498" r="5"/><circle cx="345" cy="430" r="5"/>
    <circle cx="410" cy="455" r="5"/><circle cx="435" cy="488" r="5"/>
    <circle cx="465" cy="442" r="5"/><circle cx="420" cy="408" r="5"/>
    <circle cx="495" cy="470" r="5"/><circle cx="520" cy="420" r="5"/>
  </g>

  <!-- classified, converged point cloud (right, snapped to the curve) -->
  <g fill="#5c6a58">
    <circle cx="560" cy="378" r="6"/><circle cx="600" cy="360" r="6"/>
    <circle cx="640" cy="340" r="6"/><circle cx="690" cy="318" r="6"/>
    <circle cx="740" cy="295" r="6"/><circle cx="800" cy="268" r="6"/>
    <circle cx="860" cy="248" r="6"/><circle cx="920" cy="226" r="6"/>
    <circle cx="980" cy="208" r="6"/><circle cx="1040" cy="195" r="7"/>
  </g>
  <circle cx="1040" cy="195" r="18" fill="none" stroke="#7d8c79" stroke-width="2" opacity="0.6"/>

  <text x="180" y="600" font-family="Georgia, serif" font-size="24" fill="#6b665c">90%</text>
  <text x="1010" y="170" font-family="Georgia, serif" font-size="26" fill="#5c6a58">98%</text>

  <text x="150" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#1a1a18">Point-Cloud AI Pipeline</text>
  <text x="152" y="150" font-family="Georgia, serif" font-style="italic" font-size="23" fill="#5c6a58">deep nets, 10+ TB, in production</text>
</svg>
