<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="EME Tour — a personal itinerary line connecting destinations">
  <defs>
    <linearGradient id="emeSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#ece7db"/>
    </linearGradient>
    <radialGradient id="emeSun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cdd6c8"/>
      <stop offset="1" stop-color="#cdd6c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#emeSky)"/>
  <circle cx="930" cy="180" r="190" fill="url(#emeSun)"/>
  <circle cx="930" cy="180" r="58" fill="none" stroke="#7d8c79" stroke-width="2" opacity="0.55"/>

  <!-- horizon -->
  <path d="M0 512 H1200" stroke="#1a1a18" stroke-opacity="0.10" stroke-width="1.5"/>
  <path d="M0 540 C 220 522, 430 560, 660 536 S 1010 560, 1200 534 L 1200 675 L 0 675 Z" fill="#cdd6c8" fill-opacity="0.35"/>

  <!-- the journey line: hand-shaped, dotted, personal -->
  <path d="M120 560 C 250 470, 300 360, 440 360 S 620 470, 760 360 980 200, 1080 150"
        fill="none" stroke="#5c6a58" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="2 14"/>

  <!-- stops -->
  <g fill="#1a1a18">
    <g transform="translate(120 560)">
      <circle r="10" fill="#f4f1ea" stroke="#1a1a18" stroke-width="3"/>
    </g>
    <g transform="translate(440 360)">
      <path d="M0 -34 C 18 -34 30 -22 30 -6 C 30 12 0 34 0 34 C 0 34 -30 12 -30 -6 C -30 -22 -18 -34 0 -34 Z" fill="#7d8c79"/>
      <circle cy="-6" r="9" fill="#f4f1ea"/>
    </g>
    <g transform="translate(760 360)">
      <path d="M0 -34 C 18 -34 30 -22 30 -6 C 30 12 0 34 0 34 C 0 34 -30 12 -30 -6 C -30 -22 -18 -34 0 -34 Z" fill="#1a1a18"/>
      <circle cy="-6" r="9" fill="#f4f1ea"/>
    </g>
    <g transform="translate(1080 150)">
      <circle r="13" fill="#5c6a58"/>
      <circle r="22" fill="none" stroke="#5c6a58" stroke-width="2" opacity="0.5"/>
    </g>
  </g>

  <text x="120" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="46" fill="#1a1a18" letter-spacing="2">EME</text>
  <text x="122" y="158" font-family="Georgia, serif" font-style="italic" font-size="24" fill="#5c6a58">Trips designed by you</text>
</svg>
